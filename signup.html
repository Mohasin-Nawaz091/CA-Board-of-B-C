<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | CA Board of Barbering & Cosmetology</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "accent": "#B8860B",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .auth-bg {
            background-image: linear-gradient(135deg, rgba(0, 51, 102, 0.9) 0%, rgba(15, 25, 35, 0.9) 100%), url('assets/images/auth_bg.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Navigation (Simplified for Auth) -->
    <header class="w-full bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="home.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-2xl">content_cut</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-primary dark:text-white font-black text-lg leading-none uppercase">CA BBC</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-tight">Barbering &
                        Cosmetology</p>
                </div>
            </a>
            <a href="home.html" class="text-sm font-bold text-primary hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
            </a>
        </div>
    </header>

    <main class="flex-grow auth-bg flex items-center justify-center p-6 py-12">
        <div class="w-full max-w-lg">
            <div class="glass-card p-8 md:p-10 rounded-2xl shadow-2xl border border-white/20">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-900 mb-2">Create Account</h2>
                    <p class="text-slate-500 font-medium">Join the CA Professional Network</p>
                </div>

                <form action="#" class="space-y-4" onsubmit="event.preventDefault(); window.location.href='login.html'">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">First Name</label>
                            <input type="text" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="John">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Last Name</label>
                            <input type="text" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="Doe">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">mail</span>
                            <input type="email" required
                                class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">lock</span>
                            <input type="password" required
                                class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="Create a strong password">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">License Type (Optional)</label>
                        <select
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none appearance-none bg-white">
                            <option value="">Select your specialty...</option>
                            <option value="barber">Barber</option>
                            <option value="cosmetologist">Cosmetologist</option>
                            <option value="esthetician">Esthetician</option>
                            <option value="manicurist">Manicurist</option>
                            <option value="other">Other Professional</option>
                        </select>
                    </div>

                    <div class="flex items-start py-2">
                        <input type="checkbox" required id="terms"
                            class="mt-1 w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary">
                        <label for="terms" class="ml-2 text-sm text-slate-600">
                            I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms of
                                Service</a> and <a href="#" class="text-primary font-bold hover:underline">Privacy
                                Policy</a>
                        </label>
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-white py-4 rounded-xl font-black text-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        Create My Account <span class="material-symbols-outlined">person_add</span>
                    </button>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                    <p class="text-slate-500 font-medium">Already have an account?</p>
                    <a href="login.html" class="mt-2 inline-block font-black text-primary hover:underline">Log in to
                        your account</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="py-6 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 text-center text-xs text-slate-500 font-medium">
            <p>© 2024 California Board of Barbering & Cosmetology. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
