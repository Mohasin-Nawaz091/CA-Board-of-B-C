<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | CA Board of Barbering & Cosmetology</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "accent": "#B8860B",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .auth-bg {
            background-image: linear-gradient(135deg, rgba(0, 51, 102, 0.9) 0%, rgba(15, 25, 35, 0.9) 100%), url('assets/images/auth_bg.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Navigation (Simplified for Auth) -->
    <header class="w-full bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="home.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-2xl">content_cut</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-primary dark:text-white font-black text-lg leading-none uppercase">CA BBC</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-tight">Barbering &
                        Cosmetology</p>
                </div>
            </a>
            <a href="home.html" class="text-sm font-bold text-primary hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
            </a>
        </div>
    </header>

    <main class="flex-grow auth-bg flex items-center justify-center p-6">
        <div class="w-full max-w-md">
            <div class="glass-card p-8 md:p-10 rounded-2xl shadow-2xl border border-white/20">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h2>
                    <p class="text-slate-500 font-medium">Log in to your BreEZe account</p>
                </div>

                <form action="#" class="space-y-6" onsubmit="event.preventDefault(); window.location.href='home.html'">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">mail</span>
                            <input type="email" required
                                class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-bold text-slate-700">Password</label>
                            <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">lock</span>
                            <input type="password" required
                                class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="remember"
                            class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary">
                        <label for="remember" class="ml-2 text-sm text-slate-600 font-medium">Remember me for 30
                            days</label>
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-white py-4 rounded-xl font-black text-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        Login to Dashboard <span class="material-symbols-outlined">login</span>
                    </button>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                    <p class="text-slate-500 font-medium">Don't have an account?</p>
                    <a href="signup.html" class="mt-2 inline-block font-black text-primary hover:underline">Create a New
                        Account</a>
                </div>
            </div>

            <p class="mt-8 text-center text-white/60 text-xs font-medium uppercase tracking-widest">
                California Department of Consumer Affairs
            </p>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="py-6 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 text-center text-xs text-slate-500 font-medium">
            <p>© 2024 California Board of Barbering & Cosmetology. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
